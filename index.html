<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pekobet</title>

    <style>
        body {
            background-color: skyblue;
            text-align: center;
            margin-top: 100px;
            font-family: Arial, Helvetica, sans-serif;
        }

        button {
            background-color: gray;
            color: black;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 25px; /* bikin sudut membulat */
            cursor: pointer;
            transition: all 0.3s ease; /* animasi halus */
        }

        button:hover {
            background-color: #009acd;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.9); /* efek ditekan */
        }
    </style>


</head>
<body>
    <h1>firli icip icip loli</h1>

    <button id="tombol" onclick="tampil()">klik disini </button>

    <script>
        function tampil() {
            let tombol = document.getElementById("tombol");
            tombol.innerText = "i love youuu";
        }
    </script>

</body>
</html>
